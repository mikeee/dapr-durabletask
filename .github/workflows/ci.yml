name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: ${{ matrix.name }} (${{ matrix.toolchain }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain: [msrv, stable, nightly]
        name: [Clippy, Docs, Format, Test]
        include:
          - name: Clippy
            command: cargo clippy --workspace --all-features -- -D warnings
          - name: Docs
            command: cargo doc --workspace --all-features --no-deps
          - name: Format
            command: cargo fmt --all -- --check
          - name: Test
            command: cargo nextest run --workspace --all-features
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: cachix/install-nix-action@96951a368ba55167b55f1c916f7d416bac6505fe # v31
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build sidecar
        if: matrix.name == 'Test'
        run: "nix develop .#${{ matrix.toolchain }} --command bash -c 'echo \"sidecar ready: $DURABLETASK_SIDECAR_BIN\"'"

      - name: ${{ matrix.name }}
        run: "nix develop .#${{ matrix.toolchain }} --command bash -c '${{ matrix.command }}'"