name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  NIX_CONFIG: "access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}"

jobs:
  proto-version-drift:
    name: Proto version drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Compare dapr-durabletask-proto versions
        run: |
          set -euo pipefail
          proto_version="$(grep -m1 '^version' dapr-durabletask-proto/Cargo.toml \
            | sed -E 's/.*"([^"]+)".*/\1/')"
          declared_version="$(grep -m1 'dapr-durabletask-proto[[:space:]]*=' dapr-durabletask/Cargo.toml \
            | sed -E 's/.*version[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/')"
          echo "dapr-durabletask-proto (Cargo.toml):                $proto_version"
          echo "dapr-durabletask -> dapr-durabletask-proto dep ref: $declared_version"
          if [ "$proto_version" != "$declared_version" ]; then
            echo "::error::Version drift: dapr-durabletask depends on dapr-durabletask-proto $declared_version but the crate is now at $proto_version. Wait for or merge the open auto/bump-proto-dep-${proto_version} PR before merging changes to main."
            exit 1
          fi
          echo "Proto crate version and dapr-durabletask dependency reference are in sync."

  ci:
    name: ${{ matrix.name }} (${{ matrix.toolchain }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain: [msrv, stable, nightly]
        name: [Clippy, Docs, Format, Test]
        include:
          - name: Clippy
            command: cargo clippy --workspace --all-features -- -D warnings
          - name: Docs
            command: cargo doc --workspace --all-features --no-deps
          - name: Format
            command: cargo fmt --all -- --check
          - name: Test
            command: cargo nextest run --workspace --all-features
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: ${{ runner.os }}-${{ matrix.toolchain }}
          key: ${{ matrix.toolchain }}
          cache-on-failure: true

      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable
          extra_nix_config: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            experimental-features = nix-command flakes

      - uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d # v14

      - name: Prefetch flake inputs (with retry)
        run: |
          for attempt in 1 2 3 4 5; do
            if nix flake archive --json >/dev/null; then
              echo "Flake inputs fetched on attempt $attempt"
              exit 0
            fi
            echo "::warning::Flake fetch attempt $attempt failed; retrying"
            sleep $((attempt * 10))
          done
          echo "::error::Failed to prefetch flake inputs after 5 attempts"
          exit 1

      - name: ${{ matrix.name }}
        env:
          DURABLETASK_SKIP_SIDECAR: ${{ matrix.name == 'Test' && '0' || '1' }}
        run: "nix develop .#${{ matrix.toolchain }} --command bash -c '${{ matrix.command }}'"