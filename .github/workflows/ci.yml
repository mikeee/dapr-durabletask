name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: ${{ matrix.name }} (${{ matrix.toolchain }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain: ["1.85", stable, nightly]
        name: [Clippy, Docs, Format, Test]
        include:
          - name: Clippy
            command: cargo clippy --workspace --all-features -- -D warnings
            components: clippy
          - name: Docs
            command: cargo doc --workspace --all-features --no-deps
          - name: Format
            command: cargo fmt --all -- --check
            components: rustfmt
          - name: Test
            command: cargo nextest run --workspace --all-features
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: cachix/install-nix-action@96951a368ba55167b55f1c916f7d416bac6505fe # v31
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Install Rust ${{ matrix.toolchain }}
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: ${{ matrix.toolchain }}
          components: ${{ matrix.components }}

      - name: Build sidecar
        if: matrix.name == 'Test'
        run: |
          nix develop --command bash -c 'echo "sidecar ready: $DURABLETASK_SIDECAR_BIN"'

      - name: ${{ matrix.name }}
        run: |
          nix develop --command bash -c '
            export PATH="$HOME/.rustup/toolchains/${{ matrix.toolchain }}-x86_64-unknown-linux-gnu/bin:$PATH"
            ${{ matrix.command }}
          '