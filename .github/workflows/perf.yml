name: Perf Tests

on:
  schedule:
    - cron: "0 6 * * *" # daily at 06:00 UTC
  workflow_dispatch: # allow manual trigger

jobs:
  perf:
    name: Performance tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: cachix/install-nix-action@96951a368ba55167b55f1c916f7d416bac6505fe # v31
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable

      - name: Build sidecar
        run: |
          nix develop --command bash -c 'echo "sidecar ready: $DURABLETASK_SIDECAR_BIN"'

      - name: Run perf tests
        run: |
          nix develop --command bash -c '
            export PATH="$HOME/.rustup/toolchains/stable-x86_64-unknown-linux-gnu/bin:$PATH"
            cargo nextest run --workspace --all-features -E "test(perf_)" --run-ignored all
          '
