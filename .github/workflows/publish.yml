name: Publish

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  NIX_CONFIG: "access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}"

jobs:
  publish-dry:
    name: Publish Test (${{ matrix.crate }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        crate:
          - dapr-durabletask-proto
          - dapr-durabletask
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable
          extra_nix_config: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            experimental-features = nix-command flakes

      - name: Prefetch flake inputs (with retry)
        run: |
          for attempt in 1 2 3 4 5; do
            if nix flake archive --json >/dev/null; then
              echo "Flake inputs fetched on attempt $attempt"
              exit 0
            fi
            echo "::warning::Flake fetch attempt $attempt failed; retrying"
            sleep $((attempt * 10))
          done
          echo "::error::Failed to prefetch flake inputs after 5 attempts"
          exit 1

      - name: cargo publish --dry-run - ${{ matrix.crate }}
        env:
          DURABLETASK_SKIP_SIDECAR: "1"
        run: "nix develop .#stable --command bash -c 'cargo publish -p ${{ matrix.crate }} --dry-run'"

  publish:
    name: Publish (${{ matrix.crate }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [publish-dry]
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        crate:
          - dapr-durabletask-proto
          - dapr-durabletask
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable
          extra_nix_config: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            experimental-features = nix-command flakes

      - name: Prefetch flake inputs (with retry)
        run: |
          for attempt in 1 2 3 4 5; do
            if nix flake archive --json >/dev/null; then
              echo "Flake inputs fetched on attempt $attempt"
              exit 0
            fi
            echo "::warning::Flake fetch attempt $attempt failed; retrying"
            sleep $((attempt * 10))
          done
          echo "::error::Failed to prefetch flake inputs after 5 attempts"
          exit 1

      - name: Mask CARGO_TOKEN
        env:
          CARGO_TOKEN: ${{ secrets.CARGO_TOKEN }}
        run: echo "::add-mask::${CARGO_TOKEN}"

      - name: cargo publish - ${{ matrix.crate }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_TOKEN }}
          DURABLETASK_SKIP_SIDECAR: "1"
        run: "nix develop .#stable --command bash -c 'cargo publish -p ${{ matrix.crate }}'"

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: [publish]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "${TAG}" \
            --title "${TAG}" \
            --generate-notes \
            --verify-tag
