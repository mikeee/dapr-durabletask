name: Proto dep sync

# Keeps every `dapr-durabletask` branch's declared `dapr-durabletask-proto`
# dep up to date with the **latest published** proto tag on the same
# MAJOR.MINOR line.
#
# Considered targets:
#   * `main`
#   * every `release-MAJOR.MINOR` branch (the `dapr-durabletask` release
#     branches; `release-proto-*` are excluded).
#
# For each target the workflow:
#   1. Reads the current `dapr-durabletask-proto` dep version from that
#      branch's `dapr-durabletask/Cargo.toml`.
#   2. Finds the newest `dapr-durabletask-proto-vX.Y.Z` tag in the repo
#      whose `X.Y` matches the dep's current MAJOR.MINOR.
#   3. If the newest tag is strictly greater than the current dep version,
#      opens (or updates) `auto/bump-proto-dep-<version>-into-<branch>`
#      against that branch.
#
# This pull-style design means:
#   * A release branch created *after* a proto tag will still catch up.
#   * Re-running on schedule converges every branch with no manual
#     intervention.
#   * A `release-1.0` line pinned to `dapr-durabletask-proto = "0.5.x"`
#     never gets bumped onto a different MAJOR.MINOR line.

on:
  push:
    tags: ['dapr-durabletask-proto-v*']
  schedule:
    - cron: "0 7 * * *" # daily at 07:00 UTC, one hour after proto-sync
  workflow_dispatch:

permissions:
  contents: read

env:
  NIX_CONFIG: "access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}"

jobs:
  discover:
    name: Discover bump targets
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      targets: ${{ steps.targets.outputs.targets }}
      count: ${{ steps.targets.outputs.count }}
    steps:
      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.REPO_APP_CLIENT_ID }}
          private-key: ${{ secrets.REPO_APP_PRIVATE_KEY }}

      - name: Mask App token
        run: echo "::add-mask::${{ steps.app-token.outputs.token }}"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 1

      - name: Discover branches with stale proto deps
        id: targets
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const { execFileSync } = require('child_process');

            // semver-ish compare for X.Y.Z (numeric components only).
            const cmp = (a, b) => {
              const [ax, ay, az] = a.split('.').map(Number);
              const [bx, by, bz] = b.split('.').map(Number);
              return ax - bx || ay - by || az - bz;
            };

            // 1. Collect every dapr-durabletask-proto tag and bucket by MAJOR.MINOR.
            const tagPrefix = 'dapr-durabletask-proto-v';
            const allTags = await github.paginate(github.rest.repos.listTags, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            const latestByLine = new Map(); // "MAJOR.MINOR" -> "MAJOR.MINOR.PATCH"
            for (const t of allTags) {
              if (!t.name.startsWith(tagPrefix)) continue;
              const v = t.name.slice(tagPrefix.length);
              if (!/^\d+\.\d+\.\d+$/.test(v)) continue;
              const [maj, min] = v.split('.');
              const line = `${maj}.${min}`;
              const prev = latestByLine.get(line);
              if (!prev || cmp(v, prev) > 0) latestByLine.set(line, v);
            }
            core.info(`Latest proto tag per line: ${JSON.stringify([...latestByLine])}`);

            // 2. Enumerate candidate branches: main + release-MAJOR.MINOR (not release-proto-*).
            const branches = await github.paginate(github.rest.repos.listBranches, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            const candidates = new Set(['main']);
            for (const b of branches) {
              if (/^release-(?!proto-)\d+\.\d+$/.test(b.name)) {
                candidates.add(b.name);
              }
            }

            // 3. For each candidate, read its current proto dep and decide.
            const targets = [];
            const rows = [];
            for (const branch of candidates) {
              let blob;
              try {
                execFileSync('git', ['fetch', '--depth=1', 'origin', branch], { stdio: 'ignore' });
                blob = execFileSync('git', ['show', `origin/${branch}:dapr-durabletask/Cargo.toml`], { encoding: 'utf8' });
              } catch (e) {
                core.info(`Skipping ${branch}: cannot read dapr-durabletask/Cargo.toml (${e.message})`);
                rows.push([branch, '(no Cargo.toml)', '-', 'skip']);
                continue;
              }
              const m = blob.match(/dapr-durabletask-proto\s*=\s*\{[^}]*?version\s*=\s*"([^"]+)"/s);
              if (!m) {
                rows.push([branch, '(no dep)', '-', 'skip']);
                continue;
              }
              const current = m[1];
              if (!/^\d+\.\d+\.\d+$/.test(current)) {
                rows.push([branch, current, '-', 'skip (non-semver dep)']);
                continue;
              }
              const [maj, min] = current.split('.');
              const line = `${maj}.${min}`;
              const latest = latestByLine.get(line);
              if (!latest) {
                rows.push([branch, current, '(none)', `skip (no ${line}.x tags)`]);
                continue;
              }
              if (cmp(latest, current) <= 0) {
                rows.push([branch, current, latest, 'up to date']);
                continue;
              }
              targets.push({ branch, current, latest });
              rows.push([branch, current, latest, `bump -> ${latest}`]);
            }

            core.setOutput('targets', JSON.stringify(targets));
            core.setOutput('count', String(targets.length));
            await core.summary
              .addHeading('Proto dep sync')
              .addTable([
                [
                  { data: 'Branch', header: true },
                  { data: 'Current dep', header: true },
                  { data: 'Latest matching tag', header: true },
                  { data: 'Action', header: true },
                ],
                ...rows,
              ])
              .write();

  open-bump-pr:
    name: Sync ${{ matrix.target.branch }} -> ${{ matrix.target.latest }}
    needs: discover
    if: needs.discover.outputs.count != '0'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(needs.discover.outputs.targets) }}
    steps:
      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.REPO_APP_CLIENT_ID }}
          private-key: ${{ secrets.REPO_APP_PRIVATE_KEY }}

      - name: Mask App token
        run: echo "::add-mask::${{ steps.app-token.outputs.token }}"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ matrix.target.branch }}

      - name: Update dependency reference in dapr-durabletask/Cargo.toml
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          NEW: ${{ matrix.target.latest }}
        with:
          script: |
            const fs = require('fs');
            const file = 'dapr-durabletask/Cargo.toml';
            const nextVersion = process.env.NEW;

            if (!nextVersion) throw new Error('missing NEW env var');

            const source = fs.readFileSync(file, 'utf8');
            const pattern = /(dapr-durabletask-proto\s*=\s*\{[^}]*?version\s*=\s*")([^"]+)(")/gs;
            const matches = [...source.matchAll(pattern)];

            if (matches.length !== 1) {
              throw new Error(`expected exactly 1 match in ${file}, got ${matches.length}`);
            }
            if (matches[0][2] === nextVersion) {
              core.info(`${file} already pinned to ${nextVersion}; nothing to do`);
              core.exportVariable('SKIP', '1');
              return;
            }

            const updated = source.replace(pattern, `$1${nextVersion}$3`);
            fs.writeFileSync(file, updated);
            core.info(`Updated ${file}: dapr-durabletask-proto -> ${nextVersion}`);

      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        if: env.SKIP != '1'
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable
          extra_nix_config: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            experimental-features = nix-command flakes

      - name: Prefetch flake inputs (with retry)
        if: env.SKIP != '1'
        run: |
          for attempt in 1 2 3 4 5; do
            if nix flake archive --json >/dev/null; then
              echo "Flake inputs fetched on attempt $attempt"
              exit 0
            fi
            echo "::warning::Flake fetch attempt $attempt failed; retrying"
            sleep $((attempt * 10))
          done
          echo "::error::Failed to prefetch flake inputs after 5 attempts"
          exit 1

      - name: cargo update -p dapr-durabletask-proto
        if: env.SKIP != '1'
        run: "nix develop .#stable --command bash -c 'cargo update -p dapr-durabletask-proto'"

      - name: Open or update dep-bump PR
        if: env.SKIP != '1'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ steps.app-token.outputs.token }}
          branch: auto/bump-proto-dep-${{ matrix.target.latest }}-into-${{ matrix.target.branch }}
          base: ${{ matrix.target.branch }}
          commit-message: "chore: bump dapr-durabletask-proto to ${{ matrix.target.latest }}"
          title: "chore(${{ matrix.target.branch }}): bump dapr-durabletask-proto to ${{ matrix.target.latest }}"
          body: |
            Automated sync of the `dapr-durabletask` declared dependency on
            `dapr-durabletask-proto` to the latest published patch on the
            `${{ matrix.target.latest }}` line.

            **Target branch:** `${{ matrix.target.branch }}`
            **Previous proto dep:** `${{ matrix.target.current }}` → `${{ matrix.target.latest }}`

            - Updated dep version reference in `dapr-durabletask/Cargo.toml`.
            - Refreshed `Cargo.lock` via `cargo update -p dapr-durabletask-proto`.

            Once merged into `${{ matrix.target.branch }}`, the
            `proto-version-drift` check on that branch will clear. If the
            target is a `release-*` branch, the next
            `Cut release (dapr-durabletask)` run on it will ship a
            `dapr-durabletask` patch built against the new proto.
          labels: proto-dep-bump
          reviewers: mikeee
          delete-branch: true
