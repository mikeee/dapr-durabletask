name: Proto dep bump

on:
  push:
    tags: ['dapr-durabletask-proto-v*']

permissions:
  contents: read

env:
  NIX_CONFIG: "access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}"

jobs:
  open-bump-pr:
    name: Open dapr-durabletask dep-bump PR
    runs-on: ubuntu-latest
    steps:
      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.REPO_APP_CLIENT_ID }}
          private-key: ${{ secrets.REPO_APP_PRIVATE_KEY }}

      - name: Mask App token
        run: echo "::add-mask::${{ steps.app-token.outputs.token }}"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: main

      - name: Parse new proto version from tag
        id: ver
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          new="${TAG#dapr-durabletask-proto-v}"
          echo "New version: $new"
          echo "new=$new" >> "$GITHUB_OUTPUT"

      - name: Update dependency reference in dapr-durabletask/Cargo.toml
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          NEW: ${{ steps.ver.outputs.new }}
        with:
          script: |
            const fs = require('fs');
            const file = 'dapr-durabletask/Cargo.toml';
            const nextVersion = process.env.NEW;

            if (!nextVersion) throw new Error('missing NEW env var');

            const source = fs.readFileSync(file, 'utf8');
            const pattern = /(dapr-durabletask-proto\s*=\s*\{[^}]*?version\s*=\s*")([^"]+)(")/s;
            const matches = [...source.matchAll(new RegExp(pattern.source, pattern.flags))];

            if (matches.length !== 1) {
              throw new Error(`expected exactly 1 match, got ${matches.length}`);
            }

            const updated = source.replace(pattern, `$1${nextVersion}$3`);
            fs.writeFileSync(file, updated);
            core.info(`Updated ${file}: dapr-durabletask-proto → ${nextVersion}`);

      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable
          extra_nix_config: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            experimental-features = nix-command flakes

      - name: Prefetch flake inputs (with retry)
        run: |
          for attempt in 1 2 3 4 5; do
            if nix flake archive --json >/dev/null; then
              echo "Flake inputs fetched on attempt $attempt"
              exit 0
            fi
            echo "::warning::Flake fetch attempt $attempt failed; retrying"
            sleep $((attempt * 10))
          done
          echo "::error::Failed to prefetch flake inputs after 5 attempts"
          exit 1

      - name: cargo update -p dapr-durabletask-proto
        run: "nix develop .#stable --command bash -c 'cargo update -p dapr-durabletask-proto'"

      - name: Open or update dep-bump PR
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ steps.app-token.outputs.token }}
          branch: auto/bump-proto-dep-${{ steps.ver.outputs.new }}
          base: main
          commit-message: "chore: bump dapr-durabletask-proto to ${{ steps.ver.outputs.new }}"
          title: "chore: bump dapr-durabletask-proto to ${{ steps.ver.outputs.new }}"
          body: |
            Automated bump of the `dapr-durabletask` declared dependency on
            `dapr-durabletask-proto` to `${{ steps.ver.outputs.new }}`, triggered
            by tag `${{ github.ref_name }}`.

            - Updated dep version reference in `dapr-durabletask/Cargo.toml`.
            - Refreshed `Cargo.lock` via `cargo update -p dapr-durabletask-proto`.

            Once merged, the `proto-version-drift` check on `main` clears.
          labels: proto-dep-bump
          reviewers: mikeee
          delete-branch: true
