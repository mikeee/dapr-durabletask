name: Publish dapr-durabletask-proto

on:
  push:
    branches: [main]
    paths:
      - 'dapr-durabletask-proto/**'
      - 'proto/**'
      - '.github/workflows/publish-dapr-durabletask-proto.yml'
    tags: ['dapr-durabletask-proto-v*']
  pull_request:
    branches: [main]
    paths:
      - 'dapr-durabletask-proto/**'
      - 'proto/**'
      - '.github/workflows/publish-dapr-durabletask-proto.yml'

env:
  CRATE: dapr-durabletask-proto
  NIX_CONFIG: "access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}"

jobs:
  publish-dry:
    name: Publish Test (dapr-durabletask-proto)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable
          extra_nix_config: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            experimental-features = nix-command flakes

      - name: Prefetch flake inputs (with retry)
        run: |
          for attempt in 1 2 3 4 5; do
            if nix flake archive --json >/dev/null; then
              echo "Flake inputs fetched on attempt $attempt"
              exit 0
            fi
            echo "::warning::Flake fetch attempt $attempt failed; retrying"
            sleep $((attempt * 10))
          done
          echo "::error::Failed to prefetch flake inputs after 5 attempts"
          exit 1

      - name: cargo publish --dry-run - dapr-durabletask-proto
        env:
          DURABLETASK_SKIP_SIDECAR: "1"
        run: "nix develop .#stable --command bash -c 'cargo publish -p dapr-durabletask-proto --dry-run'"

  validate-tag:
    name: Validate tag matches Cargo.toml
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/dapr-durabletask-proto-v')
    permissions:
      contents: read
    outputs:
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Verify tag matches dapr-durabletask-proto/Cargo.toml version
        id: check
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          expected="${TAG#dapr-durabletask-proto-v}"
          actual="$(grep -m1 '^version' dapr-durabletask-proto/Cargo.toml \
            | sed -E 's/.*"([^"]+)".*/\1/')"
          echo "Tag version:        $expected"
          echo "Cargo.toml version: $actual"
          if [ "$expected" != "$actual" ]; then
            echo "::error::Tag $TAG does not match dapr-durabletask-proto/Cargo.toml version ($actual)"
            exit 1
          fi
          echo "version=$actual" >> "$GITHUB_OUTPUT"

  publish:
    name: Publish (dapr-durabletask-proto)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [publish-dry, validate-tag]
    if: startsWith(github.ref, 'refs/tags/dapr-durabletask-proto-v')
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable
          extra_nix_config: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            experimental-features = nix-command flakes

      - name: Prefetch flake inputs (with retry)
        run: |
          for attempt in 1 2 3 4 5; do
            if nix flake archive --json >/dev/null; then
              echo "Flake inputs fetched on attempt $attempt"
              exit 0
            fi
            echo "::warning::Flake fetch attempt $attempt failed; retrying"
            sleep $((attempt * 10))
          done
          echo "::error::Failed to prefetch flake inputs after 5 attempts"
          exit 1

      - name: Mask CARGO_TOKEN
        env:
          CARGO_TOKEN: ${{ secrets.CARGO_TOKEN }}
        run: echo "::add-mask::${CARGO_TOKEN}"

      - name: cargo publish - dapr-durabletask-proto
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_TOKEN }}
          DURABLETASK_SKIP_SIDECAR: "1"
        run: "nix develop .#stable --command bash -c 'cargo publish -p dapr-durabletask-proto'"

  release:
    name: GitHub Release (dapr-durabletask-proto)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: [publish]
    if: startsWith(github.ref, 'refs/tags/dapr-durabletask-proto-v')
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "${TAG}" \
            --title "${TAG}" \
            --generate-notes \
            --verify-tag
